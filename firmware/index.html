<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    font-family: Arial, sans-serif;
    background: #222;
    color: #eee;
    margin: 10px;
}
h2 {
    color: #ff4444;
    margin: 5px 0 15px 0;
}
textarea {
    width: 100%;
    font-family: monospace;
    font-size: 14px;
    padding: 5px;
    border:1px solid #555;
    background:#111;
    color:#0f0;
    resize: none;
    height:400px;
    margin:0;
}
pre {
    width: 100%;
    font-family: monospace;
    font-size:14px;
    padding:5px;
    border:1px solid #555;
    background:#111;
    color:#ff0;
    resize: none;
    height:400px;
    margin:0;
    overflow:auto;
}
button {
    margin:5px;
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
#btnG, #btnH {
    background-color:red;
    color:white;
    font-weight:bold;
    font-size:20px;
    padding:18px 28px;
    border-radius:8px;
    touch-action: manipulation;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow:0 5px 0 darkred;
}
#btnG:disabled, #btnH:disabled {
    background-color: darkred;
    cursor: not-allowed;
    box-shadow: 0 5px 0 #550000;
}
#buschstatus {
    color: #ff0;
    font-weight: bold;
}
.flex-row {
    display:flex;
    gap:20px;
    align-items:flex-start;
}
#live-container {
    display:flex;
    flex-direction:column;
    justify-content:flex-start;
}
#live-buttons {
    margin-top:10px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
}
input#fname {
    font-size:16px;
    padding:4px 6px;
    background:#111;
    color:#0f0;
    border:1px solid #555;
    border-radius:4px;
}

/* NEU */
.bottom-row {
    display:flex;
    gap:20px;
    margin-top:15px;
}

.controls-box {
    display:flex;
    flex-direction:column;
}
</style>
</head>
<body>

<h2>ESP2090-Studio</h2>

<div class="flex-row">
    <!-- Editor Column -->
    <div style="flex:1; display:flex; flex-direction:column;">
        <textarea id="code"></textarea>

        <div>
            <label>Filename:
                <input id="fname" list="fname_list" type="text">
                <datalist id="fname_list"></datalist>
            </label>

            <button onclick="save()">Save</button>
            <button onclick="load()">Load</button>
            <button onclick="run()">Run</button>
            <button onclick="stop()">Stop</button>
        </div>
    </div>

    <!-- Live Console Column -->
    <div id="live-container" style="flex:1;">
        <pre id="log"></pre>
        <div id="live-buttons">
            <button id="btnG">Taste G</button>
            <button id="btnH">Taste H</button>
        </div>
    </div>
</div>

<!-- UNTERER BEREICH -->
<div class="bottom-row">

    <!-- Busch Upload -->
    <div style="flex:1;">
        <h3>Microtronic Upload</h3>
        <input type="file" id="buschfile">
        <button onclick="buschUpload()">Upload to 2090</button>
        <div id="buschstatus"></div>
    </div>

    <!-- Controls -->
    <div class="controls-box" style="flex:1;">
        <h3>Controls</h3>
        <div>
            <button onclick="resetESP()">ESP Reset</button>
            <button onclick="matrixStart()">LED Start</button>
            <button onclick="matrixStop()">LED Stop</button>
        </div>
    </div>

</div>

<script>
const codeBox = document.getElementById("code");
const inputFilename = document.getElementById("fname");
const datalistFilename = document.getElementById("fname_list");
const consoleLog = document.getElementById("log");
const buschStatus = document.getElementById("buschstatus");
const btnG = document.getElementById("btnG");
const btnH = document.getElementById("btnH");

let allFiles = [];
let scriptRunning = false;

// File List
async function loadFileList() {
    try {
        let r = await fetch("/list_py");
        allFiles = await r.json();

        datalistFilename.innerHTML = "";
        allFiles.forEach(f => {
            let opt = document.createElement("option");
            opt.value = f;
            datalistFilename.appendChild(opt);
        });

        if(allFiles.length>0 && !inputFilename.value) inputFilename.value = allFiles[0];
    } catch(e) {
        console.error("Failed to load file list", e);
    }
}
window.addEventListener("load", loadFileList);

// Save / Load / Run / Stop
async function save(){
    let filename = "userscripts/" + inputFilename.value;
    await fetch("/save?name="+filename,{method:"POST",body:codeBox.value});
    await loadFileList();
}

async function load(){
    let filename = "userscripts/" + inputFilename.value;
    let r = await fetch("/load?name="+filename);
    codeBox.value = await r.text();
}

async function run(){
    let filename = "userscripts/" + inputFilename.value;
    await fetch("/run?name="+filename);
}

async function stop(){ await fetch("/stop"); }

// Logs
async function logs(){
 let r = await fetch("/logs");
 consoleLog.innerText=await r.text();
 consoleLog.scrollTop=consoleLog.scrollHeight;
}
setInterval(logs,500);

// Busch Upload
async function buschUpload(){
 let file=document.getElementById("buschfile").files[0];
 if(!file){ alert("No file"); return; }
 let fd=new FormData();
 fd.append("file",file);
 buschStatus.innerText="Transferring...";
 let r=await fetch("/busch_upload",{method:"POST",body:fd});
 buschStatus.innerText=await r.text();
}

// Controls
async function resetESP(){
    await fetch("/reset");
}

async function matrixStart(){
    await fetch("/matrix_control?action=start");
}

async function matrixStop(){
    await fetch("/matrix_control?action=stop");
}

// Web-Taster
function triggerTaster(type){
    if(!scriptRunning) return;
    const btn = (type==="G") ? btnG : btnH;

    btn.style.transform = "translateY(4px)";
    btn.style.boxShadow = "0 1px 0 darkred";

    fetch(`/set_taste?type=${type}&value=1`);

    setTimeout(()=>{
        btn.style.transform = "translateY(0px)";
        btn.style.boxShadow = "0 5px 0 darkred";
    },500);
}

btnG.addEventListener("pointerdown", ()=>triggerTaster("G"));
btnH.addEventListener("pointerdown", ()=>triggerTaster("H"));

document.addEventListener("keydown",(e)=>{
    if(!scriptRunning) return;
    if(e.code==="Space"){ e.preventDefault(); triggerTaster("G"); }
    if(e.code==="KeyH"){ e.preventDefault(); triggerTaster("H"); }
});

// Script running check
async function updateScriptState(){
    let r = await fetch("/is_script_running");
    scriptRunning = (await r.text())==="1";
    btnG.disabled = !scriptRunning;
    btnH.disabled = !scriptRunning;
}
setInterval(updateScriptState,1000);
</script>

</body>
</html>
